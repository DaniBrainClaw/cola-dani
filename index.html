<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cola Dani — Núcleo OS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="brand">
            <h1>📋 Cola Dani</h1>
            <span class="subtitle">Núcleo OS — Cola de tareas priorizada</span>
        </div>
        <div class="header-meta">
            <div class="live-indicator">
                <span class="dot"></span>
                <span id="live-status">cargando…</span>
            </div>
            <div class="updated" id="updated">—</div>
        </div>
    </header>

    <main class="container">
        <!-- ════════ SIRVIENDO AHORA: LO GRANDE ════════ -->
        <section class="serving-hero" id="serving-hero">
            <div class="serving-hero-header">
                <span class="serving-pill">🟦 SIRVIENDO AHORA</span>
                <span class="serving-task-type" id="serving-task-type">—</span>
            </div>
            <h2 class="serving-title" id="serving-title">—</h2>
            <p class="serving-desc" id="serving-desc">—</p>

            <div class="serving-meta" id="serving-meta">
                <!-- generado por JS -->
            </div>

            <div class="serving-actions" id="serving-actions">
                <!-- botones generados por JS -->
            </div>

            <div class="serving-criteria" id="serving-criteria">
                <!-- requisitos de evidencia -->
            </div>
        </section>

        <!-- ════════ STATS ════════ -->
        <section class="stats">
            <div class="metric"><div class="metric-value" id="m-queued">—</div><div class="metric-label">En cola</div></div>
            <div class="metric"><div class="metric-value" id="m-serving">—</div><div class="metric-label">Sirviendo</div></div>
            <div class="metric"><div class="metric-value" id="m-done">—</div><div class="metric-label">Hechas</div></div>
            <div class="metric"><div class="metric-value" id="m-failed">—</div><div class="metric-label">Fallidas</div></div>
        </section>

        <!-- ════════ COLA: COLAPSABLE ════════ -->
        <section class="queue-section">
            <button class="queue-toggle" id="queue-toggle">
                <span>📋 Cola <span class="count-badge" id="queue-count">0</span></span>
                <span class="toggle-icon" id="toggle-icon">▼</span>
            </button>
            <div class="queue-collapsed" id="queue-collapsed">
                <div class="empty">Cargando…</div>
            </div>
        </section>

        <!-- ════════ HECHAS RECIENTES: COLAPSABLE ════════ -->
        <section class="queue-section">
            <button class="queue-toggle" id="done-toggle">
                <span>✅ Cerradas recientemente <span class="count-badge" id="done-count">0</span></span>
                <span class="toggle-icon" id="done-toggle-icon">▶</span>
            </button>
            <div class="queue-collapsed hidden" id="done-collapsed">
                <div class="empty">Sin cierres aún.</div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div>
            <a href="https://github.com/DaniBrainClaw/cola-dani" target="_blank">📦 Repo</a>
            ·
            <span id="footer-updated">—</span>
            ·
            <button id="refresh-btn" class="btn-refresh">🔄 Refrescar</button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
