<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cola Dani — Núcleo OS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="brand">
            <h1>📋 Cola Dani</h1>
            <span class="subtitle">Núcleo OS — Cola de tareas priorizada</span>
        </div>
        <div class="header-meta">
            <div class="live-indicator">
                <span class="dot"></span>
                <span id="live-status">cargando…</span>
            </div>
            <div class="updated" id="updated">—</div>
        </div>
    </header>

    <main class="grid">
        <!-- Stats -->
        <section class="card stats">
            <h2>Estado</h2>
            <div class="metrics">
                <div class="metric metric-queued">
                    <div class="metric-value" id="m-queued">—</div>
                    <div class="metric-label">En cola</div>
                </div>
                <div class="metric metric-serving">
                    <div class="metric-value" id="m-serving">—</div>
                    <div class="metric-label">Sirviendo</div>
                </div>
                <div class="metric metric-done">
                    <div class="metric-value" id="m-done">—</div>
                    <div class="metric-label">Hechas</div>
                </div>
                <div class="metric metric-failed">
                    <div class="metric-value" id="m-failed">—</div>
                    <div class="metric-label">Fallidas</div>
                </div>
            </div>
        </section>

        <!-- Sirviendo ahora -->
        <section class="card serving-card" id="serving-card">
            <h2>🟦 Sirviendo ahora</h2>
            <div id="serving-body" class="serving-body">
                <div class="empty">No hay tarea sirviendo.</div>
            </div>
        </section>

        <!-- Cola -->
        <section class="card queue-card">
            <h2>📋 Cola <span class="count-badge" id="queue-count">0</span></h2>
            <div id="queue-list" class="task-list">
                <div class="empty">Cargando…</div>
            </div>
        </section>

        <!-- Done recientes -->
        <section class="card done-card">
            <h2>✅ Cerradas recientemente</h2>
            <div id="done-list" class="task-list">
                <div class="empty">Sin cierres aún.</div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div>
            <a href="https://github.com/DaniBrainClaw/cola-dani" target="_blank">📦 Repo</a>
            ·
            <span id="footer-updated">—</span>
            ·
            <button id="refresh-btn" class="btn-refresh">🔄 Refrescar</button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
