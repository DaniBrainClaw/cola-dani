<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cola Dani — HOY</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="brand">
            <h1>📋 Cola Dani</h1>
            <span class="subtitle" id="subtitle">Núcleo OS</span>
        </div>
        <div class="header-meta">
            <div class="live-indicator">
                <span class="dot"></span>
                <span id="live-status">cargando…</span>
            </div>
            <div class="updated" id="updated">—</div>
        </div>
    </header>

    <main class="container">

        <!-- ════════ EVENTOS DEL DÍA ════════ -->
        <section class="section events-section" id="events-section">
            <button class="section-toggle" id="events-toggle">
                <span>📅 Eventos del día <span class="count-badge" id="events-count">0</span></span>
                <span class="toggle-icon" id="events-icon">▶</span>
            </button>
            <div class="section-collapsed hidden" id="events-body">
                <div class="empty">Cargando…</div>
            </div>
        </section>

        <!-- ════════ TAREAS CRM DEL DÍA ════════ -->
        <section class="section crm-section" id="crm-section">
            <button class="section-toggle" id="crm-toggle">
                <span>🎯 Tareas CRM del día <span class="count-badge" id="crm-count">0</span></span>
                <span class="toggle-icon" id="crm-icon">▶</span>
            </button>
            <div class="section-collapsed hidden" id="crm-body">
                <div class="empty">Cargando…</div>
            </div>
        </section>

        <!-- ════════ TAREA ACTUAL (LO GRANDE) ════════ -->
        <section class="serving-hero" id="serving-hero">
            <div class="serving-hero-header">
                <span class="serving-pill">🟦 TOCA HACER</span>
                <span class="serving-task-type" id="serving-task-type">—</span>
            </div>
            <h2 class="serving-title" id="serving-title">—</h2>
            <p class="serving-desc" id="serving-desc">—</p>

            <div class="serving-meta" id="serving-meta"></div>

            <div class="serving-actions" id="serving-actions"></div>

            <div class="serving-criteria" id="serving-criteria"></div>

            <div class="serving-tip">
                💬 Cuando termines, dime <strong>"Hecho [nombre]"</strong> y paso a la siguiente
            </div>
        </section>

        <!-- ════════ COLA: PRÓXIMAS (colapsable) ════════ -->
        <section class="section queue-section">
            <button class="section-toggle" id="queue-toggle">
                <span>📋 Próximas en cola <span class="count-badge" id="queue-count">0</span></span>
                <span class="toggle-icon" id="queue-icon">▶</span>
            </button>
            <div class="section-collapsed hidden" id="queue-body">
                <div class="empty">Cola vacía.</div>
            </div>
        </section>

        <!-- ════════ HECHAS HOY (colapsable) ════════ -->
        <section class="section done-section">
            <button class="section-toggle" id="done-toggle">
                <span>✅ Cerradas recientemente <span class="count-badge" id="done-count">0</span></span>
                <span class="toggle-icon" id="done-icon">▶</span>
            </button>
            <div class="section-collapsed hidden" id="done-body">
                <div class="empty">Sin cierres aún.</div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div>
            <a href="https://github.com/DaniBrainClaw/cola-dani" target="_blank">📦 Repo</a>
            ·
            <span id="footer-updated">—</span>
            ·
            <button id="refresh-btn" class="btn-refresh">🔄 Refrescar</button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
